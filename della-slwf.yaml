# =============================================================================
# della-slwf.yaml — personal Della 048-MS build (developed on SMLIGHT SLWF-01)
#
# Adds real Wi-Fi, an encrypted native API, and an OTA password (all from
# secrets.yaml) to the shared firmware body in della-ac.base.yaml. This is the
# build you flash for day-to-day use:  `esphome run della-slwf.yaml`.
#
# The secret-free, AP-provisioning release image is della-ac.factory.yaml.
# =============================================================================

esphome:
  name: della-slwf
  friendly_name: Della Mini Split
  # Firmware requires features from this ESPHome release or newer; older
  # versions fail validation. CI pins the exact build (see .github/workflows).
  min_version: 2026.5.3

packages:
  base: !include della-ac.base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "della-slwf Fallback"
    password: !secret fallback_ap_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
