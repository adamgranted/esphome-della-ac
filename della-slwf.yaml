# =============================================================================
# della-slwf.yaml — Della 048-MS (AUX OEM) main firmware
# Della 048-MS <-> ESP8266 dongle (developed on SMLIGHT SLWF-01)
#
# Protocol: AUX HVAC @ 4800 8E1, open-drain bus, CRC16 (RFC1071 word-sum).
# References: GrKoR/AUX_HVAC_Protocol, GrKoR/esphome_aux_ac_component.
# Full byte-level map and quirks: docs/PROTOCOL.md.
#
#   RX: remote_receiver pulse decode on GPIO14 -> bits -> 8E1 bytes -> CRC,
#       immune to the AC MCU's late rising edges (naive UART RX at 4800 can
#       misread the first 1-bit after a long 0-run).
#   TX: uart on GPIO12 (idles high, open-drain on the 5 V side -> contention-
#       safe). Pings answered here; status requests scheduled by the poller;
#       the climate entity (components/della_ac) builds SET_PARAMS by copying
#       the unit's latest settings frame and changing only commanded fields.
#
# Field layout (packet byte = body index + 8):
#   small body: [2] vlouver|setpoint<<3  [4] irtimer|frac<<7  [5] fan
#               [7] mode(0xE0)|degF(0x02)|sleep  [10] power(0x20)|clean|health
#               [12] display|mildew  [13] powlim  [14] setpoint tenths
#   big body (cmd 0x20 unsolicited / 0x21 polled): temps at packet bytes
#               15 (indoor, -0x20, tenths at 31), 16-18 coil, 20 outdoor,
#               22 compressor, 24 inverter %
# =============================================================================

esphome:
  name: della-slwf
  friendly_name: Della Mini Split
  # Firmware requires features from this ESPHome release or newer; older
  # versions fail validation. CI pins the exact build (see .github/workflows).
  min_version: 2026.5.3

esp8266:
  board: esp12e
  restore_from_flash: true

# Local custom climate component (components/della_ac/) — thin HA-thermostat
# shim over the proven pulse-decoder RX + copy-body-modify-field TX.
external_components:
  - source:
      type: local
      path: components

logger:
  baud_rate: 0          # keep the logger off the UART pins
  level: INFO           # clean by default; the "Verbose logs" switch adds
                        # per-frame detail at runtime without a reflash

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "della-slwf Fallback"
    password: !secret fallback_ap_password

captive_portal:

# TX-only UART to the AC (GPIO12 -> USB D+ -> AC RX). 4800 8E1.
uart:
  id: ac_tx
  tx_pin: GPIO12
  baud_rate: 4800
  data_bits: 8
  parity: EVEN
  stop_bits: 1

globals:
  - id: ping_count
    type: int
    initial_value: '0'
  - id: status_count
    type: int
    initial_value: '0'
  - id: bad_frame_count
    type: int
    initial_value: '0'
  - id: last_rx_ms
    type: uint32_t
    initial_value: '0'
  - id: last_ping_ms
    type: uint32_t
    initial_value: '0'
  - id: poll_tick
    type: int
    initial_value: '0'
  - id: poll_phase            # alternate small/big
    type: bool
    initial_value: 'false'
  - id: link_up               # last-published link state (for up/down logging)
    type: bool
    initial_value: 'false'

climate:
  - platform: della_ac
    id: della_thermostat
    name: "Della AC"
    uart_id: ac_tx

script:
  # Status requests. CRC16 precomputed and hand-verified:
  #   small: words BB00+0680+0000+0200+1101 = D481 -> ~ = 2B7E
  #   big:   words BB00+0680+0000+0200+2101 = E481 -> ~ = 1B7E
  - id: send_small_request
    then:
      - uart.write:
          id: ac_tx
          data: [0xBB, 0x00, 0x06, 0x80, 0x00, 0x00, 0x02, 0x00, 0x11, 0x01, 0x2B, 0x7E]
  - id: send_big_request
    then:
      - uart.write:
          id: ac_tx
          data: [0xBB, 0x00, 0x06, 0x80, 0x00, 0x00, 0x02, 0x00, 0x21, 0x01, 0x1B, 0x7E]

remote_receiver:
  pin:
    number: GPIO14
  # No `dump:` — on_raw still fires, but we skip ESPHome's built-in per-burst
  # pulse-timing log line (that was the 1 Hz spam). Frame-level detail is
  # available at runtime via the "Verbose logs" switch instead.
  filter: 20us
  # 8ms: longest legit intra-frame high is ~1.7ms; the unit can emit separate
  # frames as little as ~11ms apart (observed ping 10.9ms after a poll reply
  # at 1 Hz polling) — 30ms merged them into one unparseable burst.
  idle: 8ms
  buffer_size: 4kb
  tolerance: 25%
  on_raw:
    then:
      - lambda: |-
          if (x.size() < 5)
            return;
          uint32_t now = millis();
          id(last_rx_ms) = now;

          // pulses -> bits (4800 baud, bit = 206us; highs recentred +77us
          // for the MCU's 0..155us release lag). 34-byte frame ~ 389 bits.
          std::vector<bool> bits;
          bits.reserve(520);
          for (auto v : x) {
            int n;
            if (v < 0)
              n = (int) lroundf(-v / 206.0f);
            else
              n = (int) lroundf((v + 77.0f) / 206.0f);
            if (n < 1) n = 1;
            if (bits.size() + n > 500) break;
            for (int i = 0; i < n; i++)
              bits.push_back(v >= 0);
          }
          for (int i = 0; i < 12; i++)
            bits.push_back(true);

          // bits -> 8E1 bytes
          std::vector<uint8_t> raw_bytes;
          bool parity_ok = true;
          size_t i = 0;
          while (i + 10 < bits.size() && raw_bytes.size() < 45) {
            if (bits[i]) { i++; continue; }
            uint8_t val = 0; int ones = 0;
            for (int k = 0; k < 8; k++)
              if (bits[i + 1 + k]) { val |= 1 << k; ones++; }
            if (((ones + (bits[i + 9] ? 1 : 0)) & 1) != 0)
              parity_ok = false;
            raw_bytes.push_back(val);
            i += 11;
          }

          // Length-aware splitter: a burst may carry >1 BB-frame (frames as
          // little as ~11 ms apart can merge). Frame len = 8 + body_len + 2.
          auto dispatch = [&](const std::vector<uint8_t> &data, const std::string &hex,
                              uint32_t now) -> void {
            // ---------------- PING ----------------
          if (data.size() == 10 && data[2] == 0x01) {
            id(ping_count) += 1;
            if (id(last_ping_ms) != 0)
              id(hb_interval).publish_state((now - id(last_ping_ms)) / 1000.0f);
            id(last_ping_ms) = now;
            if (id(ping_ack_enable).state) {
              // presence answer (CRC 1E58 hand-verified)
              static const uint8_t ack[18] = {0xBB, 0x00, 0x01, 0x80, 0x01, 0x00, 0x08, 0x00,
                                              0x1C, 0x27, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
                                              0x1E, 0x58};
              id(ac_tx).write_array(ack, sizeof(ack));
            }
            return;
          }

          // ---------------- BIG STATUS (0x20 unsolicited / 0x21 polled) ----------------
          if (data.size() == 34 && data[2] == 0x07 && (data[9] == 0x20 || data[9] == 0x21)) {
            id(status_count) += 1;
            id(last_status_frame).publish_state(hex);
            id(ac_fan_code).publish_state(data[13]);
            id(indoor_temp).publish_state((float) data[15] - 0x20 + (data[31] & 0x0F) / 10.0f);
            id(coil_temp).publish_state((float) data[16] - 0x20);
            id(outdoor_temp).publish_state((float) data[20] - 0x20);
            id(compressor_temp).publish_state((float) data[22] - 0x20);
            id(inverter_power).publish_state(data[24]);
            id(della_thermostat).ingest_big((float) data[15] - 0x20 + (data[31] & 0x0F) / 10.0f,
                                            data[24]);
            return;
          }

          // ---------------- SMALL STATUS (settings; 15-byte body) ----------------
          if (data.size() == 25 && data[2] == 0x07 && data[9] == 0x11) {
            id(last_small_frame).publish_state(hex);
            id(della_thermostat).ingest_small(&data[8], 15);
            return;
          }

          // ---------------- SET ACK (4-byte body echoes our CRC) ----------------
          if (data.size() == 14 && data[2] == 0x07 && data[9] == 0x01) {
            if (id(verbose_logs).state) ESP_LOGI("della.rx", "SET ACK: %s", hex.c_str());
            return;
          }

            ESP_LOGW("aux", "UNKNOWN valid frame (%u bytes): %s", data.size(), hex.c_str());
            id(unknown_frame).publish_state(hex);
          };

          size_t pos = 0;
          int good_frames = 0;
          while (pos + 10 <= raw_bytes.size()) {
            if (raw_bytes[pos] != 0xBB) { pos++; continue; }
            size_t flen = 8 + (size_t) raw_bytes[pos + 6] + 2;
            if (raw_bytes[pos + 6] > 28 || pos + flen > raw_bytes.size()) { pos++; continue; }
            std::vector<uint8_t> data(raw_bytes.begin() + pos, raw_bytes.begin() + pos + flen);

            // CRC16 RFC1071 (odd body pads trailing zero; wire order hi,lo)
            size_t n = data.size() - 2;
            uint32_t s = 0;
            for (size_t j = 0; j + 1 < n; j += 2)
              s += ((uint32_t) data[j] << 8) | data[j + 1];
            if (n & 1)
              s += (uint32_t) data[n - 1] << 8;
            while (s >> 16)
              s = (s & 0xFFFF) + (s >> 16);
            uint16_t calc = ~s & 0xFFFF;
            uint16_t got = ((uint16_t) data[n] << 8) | data[n + 1];

            std::string hex;
            char tmp[4];
            for (auto b : data) { snprintf(tmp, sizeof(tmp), "%02X ", b); hex += tmp; }
            if (!hex.empty()) hex.pop_back();

            if (calc != got) {
              // misalignment or corruption: resync at next byte
              pos++;
              continue;
            }
            if (id(verbose_logs).state)
              ESP_LOGI("della.rx", "RX %s", hex.c_str());
            dispatch(data, hex, now);
            good_frames++;
            pos += flen;
          }

          if (good_frames == 0) {
            id(bad_frame_count) += 1;
            ESP_LOGW("aux", "Bad burst (parity_ok=%d, %u pulses -> %u bytes, no valid frame)",
                     parity_ok, x.size(), raw_bytes.size());
          }

interval:
  - interval: 1s
    then:
      - lambda: |-
          // poll scheduler
          if (id(auto_poll).state) {
            id(poll_tick) += 1;
            if (id(poll_tick) >= (int) id(poll_interval).state) {
              id(poll_tick) = 0;
              if (id(poll_phase)) id(send_big_request).execute();
              else id(send_small_request).execute();
              id(poll_phase) = !id(poll_phase);
            }
          }
  - interval: 15s
    then:
      - lambda: |-
          id(ping_count_sensor).publish_state(id(ping_count));
          id(status_count_sensor).publish_state(id(status_count));
          id(bad_frame_count_sensor).publish_state(id(bad_frame_count));
          // unit stops pinging entirely while actively polled (normal AUX
          // behavior) — any valid frame proves the link
          bool alive = (id(ping_count) + id(status_count)) > 0 &&
                       (millis() - id(last_rx_ms)) < 15000;
          id(mcu_link).publish_state(alive);
          if (alive != id(link_up)) {            // log only the transition
            id(link_up) = alive;
            ESP_LOGI("della", "AC link %s", alive ? "up" : "lost");
          }

switch:
  - platform: template
    name: "Verbose logs"
    id: verbose_logs
    icon: mdi:text-search
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
  - platform: template
    name: "Ping ACK (module presence)"
    id: ping_ack_enable
    icon: mdi:handshake
    entity_category: config
    disabled_by_default: true   # advanced/diagnostic
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: "Auto poll status"
    id: auto_poll
    icon: mdi:refresh-auto
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    name: "Unit display"
    id: unit_display
    icon: mdi:television-ambient-light
    entity_category: config
    lambda: |-
      return id(della_thermostat).display_state();
    turn_on_action:
      - lambda: |-
          id(della_thermostat).set_display(true);
    turn_off_action:
      - lambda: |-
          id(della_thermostat).set_display(false);

number:
  - platform: template
    name: "Poll interval"
    id: poll_interval
    unit_of_measurement: s
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 7
    optimistic: true
    restore_value: true
    entity_category: config
    mode: box

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic
  - platform: template
    name: "Request status now"
    id: btn_poll_now
    icon: mdi:download
    entity_category: config
    disabled_by_default: true   # advanced; auto-poll already keeps state fresh
    on_press:
      - script.execute: send_small_request
      - delay: 700ms
      - script.execute: send_big_request

sensor:
  - platform: template
    id: indoor_temp
    name: "Indoor temperature"
    device_class: temperature
    unit_of_measurement: °C
    accuracy_decimals: 1
    state_class: measurement
    update_interval: never
  - platform: template
    id: outdoor_temp
    name: "Outdoor temperature"
    device_class: temperature
    unit_of_measurement: °C
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
  - platform: template
    id: coil_temp
    name: "Evaporator coil temperature"
    device_class: temperature
    unit_of_measurement: °C
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
  - platform: template
    id: compressor_temp
    name: "Compressor temperature"
    device_class: temperature
    unit_of_measurement: °C
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
  - platform: template
    id: inverter_power
    name: "Inverter power"
    unit_of_measurement: "%"
    icon: mdi:lightning-bolt
    accuracy_decimals: 0
    state_class: measurement
    update_interval: never
  - platform: template
    id: ac_fan_code
    name: "Fan speed code"
    icon: mdi:fan
    accuracy_decimals: 0
    entity_category: diagnostic   # raw code; the climate fan mode is user-facing
    disabled_by_default: true
    update_interval: never
  # Standard device-management niceties users expect on an ESP device.
  - platform: wifi_signal
    name: "Wi-Fi signal"
    entity_category: diagnostic
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: 60s
  - platform: template
    id: hb_interval
    name: "MCU ping interval"
    unit_of_measurement: s
    accuracy_decimals: 2
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
    filters:
      - delta: 0.4
  - platform: template
    id: ping_count_sensor
    name: "Ping count"
    icon: mdi:counter
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
  - platform: template
    id: status_count_sensor
    name: "Status frame count"
    icon: mdi:counter
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
  - platform: template
    id: bad_frame_count_sensor
    name: "Bad frame count"
    icon: mdi:counter
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never

text_sensor:
  - platform: template
    id: last_status_frame
    name: "Last status frame"
    icon: mdi:matrix
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
  - platform: template
    id: last_small_frame
    name: "Last small frame"
    icon: mdi:matrix
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never
  - platform: template
    id: unknown_frame
    name: "Last unknown frame"
    icon: mdi:alert-decagram
    entity_category: diagnostic
    disabled_by_default: true
    update_interval: never

binary_sensor:
  - platform: template
    id: mcu_link
    name: "MCU heartbeat alive"
    device_class: connectivity
