# Publishes the browser-based installer page (ESP Web Tools) to GitHub Pages.
# The page pulls the firmware binaries straight from the latest release, so
# anyone can flash a Della dongle over USB from Chrome/Edge with one click.
#
# One-time setup on the repo: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions". Until that is enabled the "publish" job below will
# be the only thing that fails; the firmware release itself is unaffected.
name: Publish Pages

on:
  push:
    branches:
      - master
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'
  workflow_run:
    workflows:
      - Publish Firmware
    types:
      - completed
  pull_request:
    paths:
      - 'static/**'
      - '.github/workflows/publish-pages.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - run: mkdir -p output/firmware

      - name: Build
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./static
          destination: ./output

      - name: Fetch firmware files
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download --pattern '*' --dir output/firmware

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output
          retention-days: 1

  publish:
    if: github.event_name != 'pull_request'
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
