# Builds the secret-free release image and attaches the flashable binaries to
# the GitHub Release. Triggered when you *publish* a release (draft a release
# from a tag, then hit Publish) — not on every merge to master.
#
# Outputs uploaded to the release: della-ac.factory.bin (full-flash, for first
# install), della-ac.ota.bin, and della-ac.manifest.json (drives the ESP Web
# Tools installer page — see .github/workflows/publish-pages.yml).
name: Publish Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    # Pinned ESPHome reusable build workflow (commit == workflows tag 2026.4.1).
    uses: esphome/workflows/.github/workflows/build.yml@025a1e6255610c498ed590403b7e510b69e474df
    with:
      files: |
        della-ac.factory.yaml
      esphome-version: 2026.5.3
      combined-name: della-ac
      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}

  upload-to-release:
    name: Upload to Release
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@025a1e6255610c498ed590403b7e510b69e474df
    needs:
      - build-firmware
    with:
      version: ${{ github.event.release.tag_name }}
