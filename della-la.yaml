# =============================================================================
# della-la.yaml — TEMPORARY "logic analyzer" build for the Della 048-MS link.
# Flashes onto the same device (della-slwf); replaces the UART with a
# remote_receiver raw-pulse dump on the RX pin (GPIO14) to capture the TRUE
# waveform timings of the MCU's 2.5 s burst. Strictly read-only: input
# capture only, no UART TX possible (no uart component at all).
#
# The captured 11-byte "9E E6 ..." decode at 9600 8E1 shows run-length
# structure (all bytes are runs-of-1s, 2^n-2 values) that suggests the burst
# may not be 9600-baud UART at all. This build settles it with exact us
# timings. After capture, re-flash della-slwf.yaml (v2 research build).
# =============================================================================

esphome:
  name: della-slwf
  friendly_name: Della Mini Split

esp8266:
  board: esp12e
  restore_from_flash: true

logger:
  baud_rate: 0
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "della-slwf Fallback"
    password: !secret fallback_ap_password

captive_portal:

# Raw pulse capture on the line the Della MCU drives (GPIO14).
# UART idles HIGH; first duration of each dump is the initial active pulse
# after idle. filter well below a 9600-baud bit (104 us); idle must exceed
# intra-burst gaps but stay under the 2.5 s burst period.
remote_receiver:
  pin:
    number: GPIO14
  dump: raw
  filter: 20us
  idle: 30ms
  buffer_size: 4kb
  tolerance: 25%
